<style>
  .update-container {
    max-width: 600px;
    margin: 50px auto;
    padding: 30px;
    background: #fff;
    border: 1px solid #dbdbdb;
    border-radius: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .form-control {
    width: 100%;
    padding: 10px;
    border: 1px solid #dbdbdb;
    border-radius: 4px;
    box-sizing: border-box;
  }
  .current-img-box {
    margin-top: 10px;
    width: 150px;
    height: 150px;
    border: 1px solid #efefef;
    border-radius: 4px;
    overflow: hidden;
  }
  .submit-btn {
    width: 100%;
    padding: 12px;
    background-color: #0095f6;
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
  }
  .submit-btn:hover {
    background-color: #1877f2;
  }
</style>

<div class="update-container">
  <h2>게시글 수정하기</h2>
  <hr style="border: 0; height: 1px; background: #dbdbdb; margin-bottom: 25px;">

  <form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-group">
      <label>이미지 변경</label>
      <input type="file" name="image" class="form-control">
      
      {% if post.image %}
        <p style="font-size: 13px; color: #8e8e8e; margin: 10px 0 5px 0;">현재 등록된 이미지:</p>
        <div class="current-img-box">
          <img src="{{ post.image.url }}" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
      {% endif %}
    </div>

    <div class="form-group">
      <label for="content">내용 수정</label>
      <textarea name="content" id="content" rows="6" class="form-control" placeholder="문구를 입력하세요..." required>{{ post.content }}</textarea>
    </div>

    <button type="submit" class="submit-btn">수정 완료</button>
  </form>
</div>
