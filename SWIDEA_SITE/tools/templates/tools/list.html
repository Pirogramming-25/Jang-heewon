{% extends 'base.html' %}
{% block content %}
<h2>tool list</h2>
<a href="{% url 'tool_create'%}" style="display:inline-block; margin-bottom:15px;"> + 개발툴 추가하기</a>
<hr>

<ul>
    {%for tool in tools%}
        <li>
            <a href="{% url 'tool_detail' tool.pk %}"><strong>{{ tool.name }}</strong></a> 
            ({{ tool.kind }})
        </li>
    {% empty %}
        <p>개발툴이 없습니다</p>
    {% endfor %}
</ul>

{% endblock %}
