<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if review %}리뷰 수정{% else %}새로운 리뷰 쓰기{% endif %}</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 50px auto; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 10px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: sans-serif; }
        textarea { height: 200px; resize: vertical; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        .btn { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 14px; }
        .btn-save { background: #4CAF50; }
        .btn-back { background: #666; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <a href="{% url 'review-list' %}" style="text-decoration: none; color: black; font-weight: bold; font-size: 30px;">🎬 My Movie Reviews</a>
    <hr>
    <h1>{% if review %} 리뷰 수정{% else %} 새로운 리뷰 쓰기{% endif %}</h1>

    <form method="POST">
        {% csrf_token %}

        <label>제목</label>
        <input type="text" name="title" value="{{ review.title|default:'' }}" required>
        <label>감독</label>
        <input type="text" name="director" value="{{ review.director|default:'' }}" required>
        <label>주연 배우</label> 
        <input type="text" name="actor" value="{{ review.actor|default:'' }}" required>
        <label>장르</label>
        <select id="genre" name="genre" required>
            <option value="action" {% if review.genre == 'action' or not review %}selected{% endif %}>액션</option>
            <option value="romance" {% if review.genre == 'romance' %}selected{% endif %}>로맨스</option>
            <option value="comedy" {% if review.genre == 'comedy' %}selected{% endif %}>코미디</option>
            <option value="thriller" {% if review.genre == 'thriller' %}selected{% endif %}>스릴러</option>
            <option value="sf" {% if review.genre == 'sf' %}selected{% endif %}>SF</option>
            <option value="drama" {% if review.genre == 'drama' %}selected{% endif %}>드라마</option>
        </select>
        <label>별점</label>
        <select id="star" name="star" required>
            <option value="" disabled {% if not review %}selected{% endif %}>별점을 선택해주세요</option>
            <option value="1" {% if review.star == 1 %}selected{% endif %}>1점</option>
            <option value="2" {% if review.star == 2 %}selected{% endif %}>2점</option>
            <option value="3" {% if review.star == 3 %}selected{% endif %}>3점</option>
            <option value="4" {% if review.star == 4 %}selected{% endif %}>4점</option>
            <option value="5" {% if review.star == 5 %}selected{% endif %}>5점</option>
        </select>
        <label >러닝타임 (분)</label>
        <input type="number"  name="time" min="1" value="{{ review.time|default:'' }}" placeholder="예: 120" required>
        <label >리뷰 내용</label>
        <textarea name="content" required>{{ review.content|default:'' }}</textarea>
        <br><br>
        <button type="submit" class="btn btn-save">저장</button>
        <a href="{% url 'review-list' %}" class="btn btn-back">취소</a>
    </form>
</body>
</html>
