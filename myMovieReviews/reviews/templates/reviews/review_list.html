<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reviews_list</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 50px auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f5f5f5; }
        a { color: #333; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { padding: 5px 15px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; color: white; display: inline-block; }
        .btn-add { background: #4CAF50; margin-bottom: 15px; }
        h1 { margin-bottom: 10px; }
        .badge { background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 12px; color: #666; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body>
    <h1 style="text-decoration: none; color: black; font-weight: bold; font-size: 30px">🎬 My Movie Reviews</h1>
    <a href="{% url 'review-create' %}" style="background-color:rgba(244, 231, 116, 0.468); color: black; padding: 5px 10px; border-radius: 5px; text-decoration: none; display: inline-block;" >새 리뷰 작성하기</a>
    <hr>
    <div class="sort-links" style="margin-bottom: 15px; display: flex; align-items: center;">
        <span style="margin-right: 10px; font-weight: bold;">어떻게 정렬할까요? => </span>
        <a href="?sort=latest" style="margin-right: 10px; font-weight: bold;">최신순,</a>
        <a href="?sort=title" style="margin-right: 10px; font-weight: bold;">제목순,</a>
        <a href="?sort=star" style="margin-right: 10px; font-weight: bold;">별점순,</a>
        <a href="?sort=time" style="font-weight: bold;">상영시간순</a>
    </div>
    <table>
        <tr>
            <th style="background-color: aquamarine;">제목</th>
            <th style="background-color: aquamarine;">개봉 년도</th>
            <th style="background-color: aquamarine;">장르</th>
            <th style="background-color: aquamarine;">별점</th>
        </tr>
        {% for review in reviews %}
        <tr>
            <td>{{ review.pk }}</td>
            <td><a href="{% url 'review-detail' review.pk %}">{{ review.title }}</a></td>
            <td>{{ review.get_genre_display }}</td>
            <td>{{ review.star }}점</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">게시글이 없습니다.</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
