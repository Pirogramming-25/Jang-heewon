<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{{ page_info.title }}{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        nav { background: #343a40; padding: 12px 20px; margin-bottom: 25px; border-radius: 6px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; font-weight: bold; }
        .badge-free { font-size: 0.75rem; color: #28a745; }
        .badge-login { font-size: 0.75rem; color: #ffc107; }

        .info-card { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 15px 20px; margin-bottom: 20px; }
        .info-card p { margin: 5px 0; font-size: 0.95rem; }
        .form-group { margin-bottom: 15px; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        
        #loading { display: none; margin-top: 15px; color: #007bff; font-weight: bold; }
        #result-box { display: none; margin-top: 20px; padding: 15px; background: #e7f5ff; border-left: 5px solid #1c7ed6; border-radius: 4px; white-space: pre-wrap; }
        #error-box { display: none; margin-top: 20px; padding: 15px; background: #ffe3e3; border-left: 5px solid #e03131; color: #c92a2a; border-radius: 4px; }
        
        .history-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .history-item { background: #fafafa; border: 1px solid #ddd; padding: 10px 15px; margin-bottom: 10px; border-radius: 4px; }
        .history-date { font-size: 0.8rem; color: #888; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- 공통 네비게이션 바 -->
    <nav>
        <a href="/sentiment/">감정 분석 <span class="badge-free">(비회원 가능)</span></a>
        <a href="/summarize/">문서 요약 <span class="badge-login">(로그인 필요)</span></a>
        <a href="/moderate/">유해 표현 분석 <span class="badge-login">(로그인 필요)</span></a>
        <a href="/combo/">복합 분석 <span class="badge-login">(로그인 필요)</span></a>
        <div>
            {% if user.is_authenticated %}
                <span style="color: rgb(255, 255, 255); margin-right: 10px;">{{ user.username }}님</span>
                <a href="/accounts/logout/" style="color: #ff6b6b; text-decoration: none; font-size: 0.9rem;">로그아웃</a>
            {% else %}
                <a href="/accounts/login/" style="color: #17a2b8; margin-right: 10px; text-decoration: none; font-size: 0.9rem;">로그인</a>
                <a href="/accounts/signup/" style="color: #28a745; text-decoration: none; font-size: 0.9rem;">회원가입</a>
            {% endif %}
        </div>
    </nav>

    
    <!-- 페이지 본문 영역 -->
    {% block content %}
    {% endblock %}

</body>
</html>
