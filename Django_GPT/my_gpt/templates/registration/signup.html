{% extends 'base.html' %}

{% block title %}회원가입{% endblock %}

{% block content %}
<h2>회원가입</h2>

<div class="info-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="margin-top: 15px;">회원가입 완료</button>
    </form>
</div>

<p style="margin-top: 15px; font-size: 0.9rem;">
    이미 계정이 있으신가요? <a href="/accounts/login/">로그인하러 가기</a>
</p>
{% endblock %}
